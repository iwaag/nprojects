schema_version: "1.0"
profiles:
  demo:
    group: demo_server
    config_schema_version: "1"
    variables:
      enabled:
        ansible_variable: demo_enabled
        type: boolean
        required: false
      peers:
        ansible_variable: demo_peers
        type: list
        items: string
        required: false

cases:
  - name: linux_actual_state
    action: platform
    input:
      actual_state_policy: required
      expected_host_os: linux
      declared_host_os: null
      observed_system: Linux
      power_control: wol
    expected_host_os: linux

  - name: macos_actual_state
    action: platform
    input:
      actual_state_policy: required
      expected_host_os: macos
      declared_host_os: null
      observed_system: Darwin
      power_control: macos_sleep
    expected_host_os: macos

  - name: haos_declared_state
    action: platform
    input:
      actual_state_policy: declared
      expected_host_os: null
      declared_host_os: haos
      observed_system: null
      power_control: none
    expected_host_os: haos

  - name: missing_actual_data
    action: freshness
    collected_at: null
    generated_at: "2026-06-27T12:00:00+00:00"
    expected_reason: missing_actual_data

  - name: stale_actual_data
    action: freshness
    collected_at: "2026-06-24T11:59:59+00:00"
    generated_at: "2026-06-27T12:00:00+00:00"
    expected_reason: stale_actual_data

  - name: endpoint_mismatch
    action: endpoint_ownership
    desired_node_slug: node-a
    endpoint_node_slug: node-b
    expected_error: endpoint_node_mismatch

  - name: unknown_profile
    action: placement_config
    profile: missing
    config_schema_version: "1"
    config: {}
    expected_error: unknown_profile

  - name: invalid_profile_value_type
    action: placement_config
    profile: demo
    config_schema_version: "1"
    config:
      enabled: "true"
    expected_error: invalid_profile_value_type

  - name: ambiguous_service_reference
    action: reference_count
    kind: desired_service
    match_count: 2
    expected_error: ambiguous_reference

  - name: desired_actual_os_mismatch
    action: platform
    input:
      actual_state_policy: required
      expected_host_os: linux
      declared_host_os: null
      observed_system: Darwin
      power_control: macos_sleep
    expected_host_os: macos
    expected_drift: desired_actual_os_mismatch

  - name: invalid_platform_power
    action: platform
    input:
      actual_state_policy: required
      expected_host_os: linux
      declared_host_os: null
      observed_system: Linux
      power_control: macos_sleep
    expected_error: invalid_platform_power

  - name: conflicting_placement_variables
    action: merge_variables
    assignments:
      - source: demo-primary
        variables:
          demo_enabled: true
      - source: demo-secondary
        variables:
          demo_enabled: false
    expected_error: conflicting_host_variable
